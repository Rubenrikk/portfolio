# DO NOT RENAME — branch-protection contract.
# The `name:` field below is the prefix of every required status check
# ("CI Quality Gate Baseline / lint", "… / test", "… / dependency-audit",
# "… / secret-scan"). Renaming this workflow or the jobs below will silently
# break branch protection across every consuming repository. See
# docs/ci-quality-gate-baseline.md and SPO-20 / SPO-31 for context.
name: CI Quality Gate Baseline

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/reusable-lint.yml
    with:
      lint-command: npm run lint --if-present

  test:
    uses: ./.github/workflows/reusable-test.yml
    with:
      test-command: npm test

  dependency-audit:
    uses: ./.github/workflows/reusable-dependency-audit.yml
    with:
      audit-level: critical

  secret-scan:
    uses: ./.github/workflows/reusable-secret-scan.yml
