name: Reusable Test

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version for test jobs
        required: false
        default: '20'
        type: string
      test-command:
        description: Command used to run tests
        required: false
        default: npm test -- --ci
        type: string

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: ${{ inputs.test-command }}
