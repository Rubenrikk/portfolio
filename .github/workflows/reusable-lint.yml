name: Reusable Lint

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version for lint jobs
        required: false
        default: '20'
        type: string
      lint-command:
        description: Command used to run linting
        required: false
        default: npm run lint --if-present
        type: string

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint command
        run: ${{ inputs.lint-command }}
